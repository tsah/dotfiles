# Shell
if-shell 'test -x /usr/local/bin/zsh' 'set -g default-shell /usr/local/bin/zsh' 'set -g default-shell /usr/bin/zsh'

# Keep Wayland clipboard vars available inside tmux panes.
set -ga update-environment WAYLAND_DISPLAY
set -ga update-environment XDG_RUNTIME_DIR
set -ga update-environment DBUS_SESSION_BUS_ADDRESS
set -ga update-environment SSH_AUTH_SOCK
set -ga update-environment REMOTE_OPEN_HOST
set -ga update-environment REMOTE_OPEN_LOCALHOST_HOST

# Never let worker-local lifecycle state leak through a server started by a worker.
set-environment -gu PI_TMUX_AUTO_STOP
set-environment -gu PI_TMUX_WAIT_SIGNAL_FILE
set-environment -gu TMUX_PANE

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
# Enable modern modified key reporting (Ctrl/Alt/Shift combos)
set -s extended-keys always
set -s extended-keys-format csi-u
set -ag terminal-features "xterm-kitty:extkeys"
set -as terminal-features ",*:clipboard"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g display-time 4000
set -g focus-events on
set -g set-clipboard on
if-shell 'tmux set -g allow-passthrough on 2>/dev/null' ''
setw -g aggressive-resize on
set -g detach-on-destroy off

# Reload config
bind q source-file ~/.tmux.conf

# Vi mode for copy
setw -g mode-keys vi
bind -n M-PageUp copy-mode -eu
bind -n M-PageDown copy-mode -ed
bind -T copy-mode-vi M-PageUp send-keys -X page-up
bind -T copy-mode-vi M-PageDown send-keys -X page-down-and-cancel
bind -T copy-mode M-PageUp send-keys -X page-up
bind -T copy-mode M-PageDown send-keys -X page-down-and-cancel
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode y send-keys -X copy-selection-and-cancel
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Pane controls
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"
bind -n M-w confirm-before -p "kill pane #P? (y/n)" kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window controls
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k confirm-before -p "kill window #W? (y/n)" kill-window

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K confirm-before -p "kill session #S? (y/n)" kill-session
bind P switch-client -p
bind N switch-client -n

# Switch last client
bind l switch-client -l

# Alt bindings (no prefix needed). Explicitly clear removed bindings when re-sourcing.
unbind -n M-c
unbind -n M-d
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-d if-shell -F '#{@alt_k_tui_open}' 'send-keys Escape d' 'confirm-before -p "kill session #S? (y/n)" "run-shell '\''tmux switch-client -n 2>/dev/null; tmux kill-session -t \"=#S\"'\''"'
bind -n M-x run-shell 'current="$(tmux display-message -p "#S")"; tmux switch-client -n 2>/dev/null; tmux kill-session -t "=$current"'
# Worktree/session creation remains available as a direct shortcut.
bind -n M-b display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "ALT_K_TUI_MODE=spawn ~/dotfiles/bin/workspace-picker"
bind -n M-g run-shell "~/dotfiles/bin/tmux-open-current-pr.sh '#{pane_current_path}'"
bind -n M-j copy-mode
bind -n M-k display-popup -E -w 90% -h 80% "~/dotfiles/bin/workspace-picker"
bind -n M-o run-shell "~/dotfiles/bin/opencode-pick"

# Alt+number window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+arrow window and session navigation
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# Smart pane switching with Neovim awareness (fallback when vim-tmux-navigator plugin unavailable)
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

# Theme (ANSI color names — follows terminal palette for Omarchy theme switching)
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
setw -g automatic-rename on
setw -g automatic-rename-format '#{b:pane_current_path}'
set -g set-titles on
set -g set-titles-string '#h:#W'
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

# Clipboard paste
# Leave C-S-v unbound so the terminal can perform native bracketed paste,
# especially in SSH sessions where tmux cannot read the local clipboard.
unbind-key -n C-S-v
bind-key -n S-Insert run-shell -b "~/dotfiles/bin/tmux-paste-clipboard '#{pane_id}'"
bind-key -n MouseDown2Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { run-shell -b "~/dotfiles/bin/tmux-paste-clipboard '#{mouse_pane}'" }

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @override_copy_command '~/dotfiles/bin/wl-copy'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'u'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @scroll-speed-num-lines-per-scroll 1

run '~/.tmux/plugins/tpm/tpm'
